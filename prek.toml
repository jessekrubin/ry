# https://prek.j178.dev/configuration/
fail_fast = true

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-toml" },
  { id = "check-yaml" },
]

[[repos]]
repo = "https://github.com/charliermarsh/ruff-pre-commit"
rev = "v0.15.11"
hooks = [{ id = "ruff-format" }, { id = "ruff-check" }]
